name: Terraform validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Public-safe Terraform validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CHECKPOINT_DISABLE: "1"
      TF_IN_AUTOMATION: "1"
      TF_INPUT: "0"
      TERRAFORM_ENABLE_CHECKOV: "0"
      TERRAFORM_ENABLE_TFLINT: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Test validation contract
        run: ./tests/validate_public_safety_test.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Run public-safe validation
        run: ./scripts/validate.sh
